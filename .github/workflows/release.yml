name: Release Tauri Portable

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install npm dependencies
        run: npm install

      - name: Build Tauri (sin instalador — solo exe portable)
        shell: pwsh
        run: npx tauri build --config '{"bundle":{"active":false}}'

      - name: Rename portable exe
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          cp "src-tauri/target/release/foto-carnet-tauri.exe" \
             "FotoCarnet-Tauri-${TAG}-Portable.exe"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: FotoCarnet Tauri ${{ github.ref_name }}
          body: |
            ## FotoCarnet Tauri ${{ github.ref_name }}

            Versión Tauri — más ligera y rápida que la versión Electron (~8 MB vs ~120 MB).

            ### Uso
            Descarga el `.exe` y ejecútalo directamente — **no requiere instalación**.

            > **Requisito:** Windows 10/11 con WebView2 instalado (ya incluido en Windows 11 y en Windows 10 con Edge actualizado).

            > Si Windows muestra advertencia de seguridad, haz clic en **"Más información" → "Ejecutar de todas formas"**
          files: FotoCarnet-Tauri-*-Portable.exe
          draft: false
          prerelease: false
